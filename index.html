<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Ladooo ❤️</title>

<style>
body {
  body {
  margin: 0;
  background: pink;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  text-align: center;
  overflow: hidden;
}

/* PASSWORD SCREEN */
#lockScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

input {
  padding: 10px;
  border-radius: 20px;
  border: none;
  text-align: center;
}

button {
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  margin-top: 10px;
  cursor: pointer;
}

/* MAIN CONTENT */
#main {
  display: none;
  position: relative;
  z-index: 2;
  text-align: center;
  padding-top: 100px;
}

/* GLOW NAME */
.glow {
  font-size: 40px;
  color: #ff4d6d;
  animation: glow 1s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px pink; }
  to { text-shadow: 0 0 30px red; }
}

/* HEARTS */
.heart {
  position: absolute;
  color: red;
  animation: fall linear infinite;
}

@keyframes fall {
  0% { transform: translateY(-10vh); }
  100% { transform: translateY(110vh); }
}
/* FLOWERS */
  .flower {
  position: absolute;
  font-size: 20px;
  animation: fall linear infinite;
}
  @keyframes fall {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(100vh); opacity: 0; }
    
/* GIFT BOX */
.gift {
  font-size: 60px;
  cursor: pointer;
  margin-top: 20px;
}

#message {
  margin-top: 20px;
  font-size: 22px;
  white-space: pre-line;
}
</style>
</head>

<body>

<!-- PASSWORD LOCK -->
<div id="lockScreen">
  <h2>Enter Password ❤️</h2>
  <input type="password" id="pass" placeholder="Enter password">
  <button onclick="checkPass()">Unlock</button>
</div>

<!-- MAIN CONTENT -->
<div id="main">
  <h1 class="glow">Eid Mubarak Ladooo ❤️</h1>
  <div class="gift" onclick="openGift()">🎁</div>
  <div id="message"></div>
</div>
  
<!-- MAIN -->
<div id="main">

h1 {
  position: relative;
  z-index: 3;
}
  
  <h1 class="glow">Eid Mubarak Ladooo ❤️</h1>

  <div class="gift" onclick="openGift()">🎁</div>

  <div id="message"></div>

</div>

<!-- MUSIC -->
<audio autoplay loop>
  <source src="https://dl.sndup.net/wx9h/Tera%20Ban%20Jaunga.mp3" type="audio/mp3">
</audio>

<script>

// PASSWORD
function checkPass() {
  let p = document.getElementById("pass").value;
  if (p === "ladoo") {
    document.getElementById("lockScreen").style.display = "none";
    document.getElementById("main").style.display = "block";
  } else {
    alert("Wrong Password 😜");
  }
}

// MESSAGE
const msg =
`Eid Mubarak meri pyari Ladooo ❤️

Eid Mubarak my beautifulwife ❤️

It's me, your Duddy 💕

On this special day, I just want to tell you...
You are the most precious part of my life 🥺

Even though we are far apart,
you are always in my heart, in my thoughts, in everything I do 💖

Every Eid feels incomplete without you...
I wish I could hug you right now 🫂

You are not just my love,
you are my happiness, my peace, my everything 😍

I miss you so much my Ladooo...
And I promise, one day we will celebrate every Eid together ❤️

Allah tumhe hamesha khush rakhe 🥺

Miss you so much meri Ladooo 🫂

Raat ko jab tum gyi thi mein nein
is leya nhi roka cause mein is pey deehan dena chahta tha.

baki all the best.
pics or videos bana na mat bhulna..

I Love You Forever meri Ladooo ❤️`;

let i = 0;

// OPEN GIFT
function openGift() {
  document.querySelector(".gift").innerHTML = "💖";
  typeText();
}

// TYPING
function typeText() {
  if (i < msg.length) {
    document.getElementById("message").innerHTML += msg.charAt(i);
    i++;
    setTimeout(typeText, 40);
  }
}
  
function createFlower() {
  let f = document.createElement("div");
  f.classList.add("flower");
  f.innerHTML = "🌸";
  f.style.left = Math.random() * 100 + "vw";
  f.style.animationDuration = (Math.random()*4+3)+"s";
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),5000);
}

@keyframes explode {
  0% { transform: scale(1) rotate(0deg); opacity: 1; }
  100% { transform: scale(2) rotate(360deg); opacity: 0; }
}
  
setInterval(createFlower,500);
// HEARTS
function createHeart() {
  let h = document.createElement("div");
  h.classList.add("heart");
  h.innerHTML = "❤️";
  h.style.left = Math.random() * 100 + "vw";
  h.style.animationDuration = (Math.random()*3+2)+"s";

  // CLICK explosion effect
  h.addEventListener("click", () => {
    h.style.animation = "explode 0.5s forwards";
    setTimeout(() => h.remove(), 500); // remove after animation
  });

  document.body.appendChild(h);
  setTimeout(()=>h.remove(),5000);
}
setInterval(createHeart,300);

</script>

</body>
</html>
