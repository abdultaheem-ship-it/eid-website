<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Ladooo ❤️</title>

<style>
/* BODY */
body {
  margin: 0;
  background: linear-gradient(to right, #ff9a9e, #fecfef);
  font-family: 'Segoe UI', sans-serif;
  color: white;
  text-align: center;
  overflow: hidden;
}

/* PASSWORD SCREEN */
#lockScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(to right, #ff9a9e, #fecfef);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: black;
  z-index: 10;
}

input {
  padding: 12px;
  border-radius: 20px;
  border: none;
  text-align: center;
  margin-top: 10px;
  outline: none;
}

button {
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  margin-top: 10px;
  cursor: pointer;
}

/* MAIN CONTENT */
#main {
  display: none;
  position: relative;
  z-index: 2;
  text-align: center;
  padding-top: 100px;
  color: white;
}

/* GLOW NAME */
.glow {
  font-size: 40px;
  color: #ff4d6d;
  animation: glow 1s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px pink; }
  to { text-shadow: 0 0 30px red; }
}

/* HEARTS */
.heart {
  position: fixed;
  color: red;
  animation: fallHeart linear infinite;
  font-size: 24px;
  z-index: 0;
}

/* FLOWERS */
.flower {
  position: fixed;
  font-size: 20px;
  animation: fallFlower linear infinite;
  z-index: 0;
}

/* Heart fall animation */
@keyframes fallHeart {
  0% { transform: translateY(-10vh); opacity: 1; }
  100% { transform: translateY(110vh); opacity: 0; }
}

/* Flower fall animation */
@keyframes fallFlower {
  0% { transform: translateY(-10vh); opacity: 1; }
  100% { transform: translateY(110vh); opacity: 0; }
}

/* Gift box */
.gift {
  font-size: 60px;
  cursor: pointer;
  margin-top: 20px;
  position: relative;
  z-index: 3;
}

/* Typing message */
#message {
  margin-top: 20px;
  font-size: 22px;
  white-space: pre-line;
}

/* Explode animation */
@keyframes explode {
  0% { transform: scale(1) rotate(0deg); opacity: 1; }
  100% { transform: scale(2) rotate(360deg); opacity: 0; }
}

/* Glow for h1 */
h1 {
  position: relative;
  z-index: 3;
}
</style>
</head>

<body>

<!-- PASSWORD LOCK -->
<div id="lockScreen">
  <h2>Enter Password ❤️</h2>
  <input type="password" id="pass" placeholder="Enter password">
  <button onclick="checkPass()">Unlock</button>
</div>

<!-- MAIN CONTENT -->
<div id="main">
  <h1 class="glow">Eid Mubarak Ladooo ❤️</h1>
  <div class="gift" onclick="openGift()">🎁</div>
  <div id="message"></div>
</div>

<!-- MUSIC -->
<audio autoplay loop>
  <source src="https://dl.sndup.net/wx9h/Tera%20Ban%20Jaunga.mp3" type="audio/mp3">
</audio>

<script>
// PASSWORD CHECK
function checkPass() {
  let p = document.getElementById("pass").value;
  if (p === "ladoo") {
    document.getElementById("lockScreen").style.display = "none";
    document.getElementById("main").style.display = "block";
  } else {
    alert("Wrong Password 😜");
  }
}

// MESSAGE TEXT
const msg = `Eid Mubarak meri pyari Ladooo ❤️

Eid Mubarak my beautifulwife ❤️

It's me, your Duddy 💕

On this special day, I just want to tell you...
You are the most precious part of my life 🥺

Even though we are far apart,
you are always in my heart, in my thoughts, in everything I do 💖

Every Eid feels incomplete without you...
I wish I could hug you right now 🫂

You are not just my love,
you are my happiness, my peace, my everything 😍

I miss you so much my Ladooo...
And I promise, one day we will celebrate every Eid together ❤️

Allah tumhe hamesha khush rakhe 🥺

Miss you so much meri Ladooo 🫂

Raat ko jab tum gyi thi mein nein
is leya nhi roka cause mein is pey deehan dena chahta tha.

baki all the best.
pics or videos bana na mat bhulna..

I Love You Forever meri Ladooo ❤️`;

let i = 0;

// OPEN GIFT
function openGift() {
  document.querySelector(".gift").innerHTML = "💖";
  typeText();
}

// TYPING EFFECT
function typeText() {
  if (i < msg.length) {
    document.getElementById("message").innerHTML += msg.charAt(i);
    i++;
    setTimeout(typeText, 40);
  }
}

// CREATE HEART
function createHeart() {
  let h = document.createElement("div");
  h.classList.add("heart");
  h.innerHTML = "❤️";
  h.style.left = Math.random() * 100 + "vw";
  h.style.animationDuration = (Math.random()*3+2)+"s";

  // CLICK explode
  h.addEventListener("click", () => {
    h.style.animation = "explode 0.5s forwards";
    setTimeout(() => h.remove(), 500);
  });

  document.body.appendChild(h);
  setTimeout(() => h.remove(), 5000);
}
setInterval(createHeart, 300);

// CREATE FLOWERS
function createFlower() {
  let f = document.createElement("div");
  f.classList.add("flower");
  f.innerHTML = "🌸";
  f.style.left = Math.random() * 100 + "vw";
  f.style.animationDuration = (Math.random()*4+3)+"s";
  document.body.appendChild(f);
  setTimeout(() => f.remove(), 5000);
}
setInterval(createFlower, 500);
</script>

</body>
</html>
