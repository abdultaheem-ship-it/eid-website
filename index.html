<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Ladooo ❤️</title>

<style>
body {
  body {
  margin: 0;
  background: linear-gradient(to right, #ff9a9e, #fecfef);
  font-family: 'Segoe UI', sans-serif;
  color: white;
  text-align: center;
  overflow: hidden;
}
  .flower {
  position: absolute;
  font-size: 20px;
  animation: fall linear infinite;
}

/* PASSWORD SCREEN */
#lockScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

input {
  padding: 10px;
  border-radius: 20px;
  border: none;
  text-align: center;
}

button {
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  margin-top: 10px;
  cursor: pointer;
}

/* MAIN CONTENT */
#main {
  display: none;
  position: relative;
  top: 50%;
  transform: translateY(-50%);
}

/* GLOW NAME */
.glow {
  font-size: 40px;
  color: #ff4d6d;
  animation: glow 1s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px pink; }
  to { text-shadow: 0 0 30px red; }
}

/* HEARTS */
.heart {
  position: absolute;
  color: red;
  animation: fall linear infinite;
}

@keyframes fall {
  0% { transform: translateY(-10vh); }
  100% { transform: translateY(110vh); }
}

/* GIFT BOX */
.gift {
  font-size: 60px;
  cursor: pointer;
  margin-top: 20px;
}

#message {
  margin-top: 20px;
  font-size: 22px;
  white-space: pre-line;
}
</style>
</head>

<body>

<!-- PASSWORD LOCK -->
<div id="lockScreen">
  <h2>Enter Password ❤️</h2>
  <input type="password" id="pass" placeholder="Enter password">
  <button onclick="checkPass()">Unlock</button>
</div>

<!-- MAIN -->
<div id="main">

  <h1 class="glow">Eid Mubarak Ladooo ❤️</h1>

  <div class="gift" onclick="openGift()">🎁</div>

  <div id="message"></div>

</div>

<!-- MUSIC -->
<audio autoplay loop>
  <source src="https://dl.sndup.net/wx9h/Tera%20Ban%20Jaunga.mp3" type="audio/mp3">
</audio>

<script>

// PASSWORD
function checkPass() {
  let p = document.getElementById("pass").value;
  if (p === "ladoo") {
    document.getElementById("lockScreen").style.display = "none";
    document.getElementById("main").style.display = "block";
  } else {
    alert("Wrong Password 😜");
  }
}

// MESSAGE
const msg =
`Eid Mubarak meri pyari Ladooo ❤️

Main tumhara Duddy 💕
Bas yeh kehna chahta hoon...

Tum meri life ki sab se beautiful feeling ho 🥺
Door ho lekin dil ke sab se kareeb ho 💖

Har Eid tumhare bina adhuri lagti hai...
Kaash main tumhare saath hota 🫂

I Love You Forever meri Ladooo ❤️`;

let i = 0;

// OPEN GIFT
function openGift() {
  document.querySelector(".gift").innerHTML = "💖";
  typeText();
}

// TYPING
function typeText() {
  if (i < msg.length) {
    document.getElementById("message").innerHTML += msg.charAt(i);
    i++;
    setTimeout(typeText, 40);
  }
}
  
function createFlower() {
  let f = document.createElement("div");
  f.classList.add("flower");
  f.innerHTML = "🌸";
  f.style.left = Math.random() * 100 + "vw";
  f.style.animationDuration = (Math.random()*4+3)+"s";
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),5000);
}
  
setInterval(createFlower,500);
// HEARTS
function createHeart() {
  let h = document.createElement("div");
  h.classList.add("heart");
  h.innerHTML = "❤️";
  h.style.left = Math.random() * 100 + "vw";
  h.style.animationDuration = (Math.random()*3+2)+"s";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),5000);
}
setInterval(createHeart,300);

</script>

</body>
</html>
